item.mscience-M碎晶.name=M碎晶
item.mscience-M碎晶.description=
item.mscience-M晶体.name=M晶体
item.mscience-M晶体.description=一种由高维能量坍缩形成的多面体矿物，分子结构呈现超对称性，能吸收并放大电磁波，用于量子计算机核心。\n\
被称为“混沌之眼”，术士将其研磨成粉末绘制法阵，可短暂撕裂空间，召唤异界生物。\n\
外观：表面布满蜂窝状纹路，时不时发出轻微的蜂鸣声。
item.mscience-幻光石.name=幻光石
item.mscience-幻光石.description=纳米级棱镜结构，可折射所有可见光波段，用于全息投影设备的“光学心脏”。\n\
月光下呈现虹彩渐变的液态矿石，日间则凝固为银色金属。常被精灵族用作星轨仪材料，其折射角度能精准预测彗星轨迹。传说内含月神泪滴。\n\
外观：半透明淡蓝色矿石，内部有光晕流动。
item.mscience-星辉铜.name=星辉铜
item.mscience-星辉铜.description=含稀有同位素的铜矿，在真空环境下通电会释放中微子脉冲，用于深空通信基站。\n\
表面布满金色星芒纹路。锻造武器时会产生类似超新星爆发的魔纹，但99%的矿石会在淬火时碎裂，仅存完整品皆为传世神兵。
item.mscience-幽影铁.name=幽影铁
item.mscience-幽影铁.description=超导材料，在零下200℃时可使周围光线弯曲，用于隐形战机涂层。\n\
刺客公会高价收购未定型态的原矿，可打造穿透灵体防御的暗影刃。刀刃划过之处会留下持续数秒的“真空暗域”。\n\
外观：开采时永远处于半虚化状态的特殊金属，需用纯银容器保存。
item.mscience-蓝美晶.name=蓝美晶
item.mscience-蓝美晶.description=极端压力下形成的硅酸盐晶体，能存储海量数据，用于文明备份库。\n\
深海祭司将其雕琢成祭坛，可召唤远古利维坦的虚影。\n\
外观：深海蓝色六棱柱，内部有液态光流涌动。
item.mscience-炽炎硫.name=炽炎硫
item.mscience-炽炎硫.description=燃烧效率是普通硫磺的300倍，用于核聚变反应堆的点火燃料。\n\
火山口周期性喷发的燃烧矿石，在空中会自行组成火焰符文。炼金师将其研磨成绯红粉末，是制作永燃火炬和熔岩傀儡驱动核心的关键材料。
item.mscience-月银.name=月银
item.mscience-月银.description=对引力波异常敏感，用于反重力引擎。\n\
矮人王室的传世铠甲均掺杂此物，月光下可激活隐形力场，但会持续消耗穿戴者寿命。炼金师将其铸成银币，满月时抛洒可暂时固化月光为实体阶梯。\n\
外观：只在双月同天时凝结的液态金属，表面漂浮着银雾状月尘。
item.mscience-梦境翡翠.name=梦境翡翠
item.mscience-梦境翡翠.description=能记录人类脑电波的生物矿物，用于治疗PTSD的沉浸式疗法舱。\n\
梦魇巫师将其研磨成粉吸入，可自由穿梭他人梦境。\n\
外观：生长在沉睡巨龙颅骨内的翠绿色半透明玉石，接触时会随机读取他人梦境。被圣光教会列为违禁品，内部有漩涡状纹路。
item.mscience-曙光金.name=曙光金
item.mscience-曙光金.description=在超新星残骸中发现的合金，能转化伽马射线为电能，用于戴森球能源网。\n\
锻造师们用于铸造不会磨损的时之轮零件；圣骑士将其镀在铠甲上，也可免疫一切亡灵诅咒。\n\
黎明时分在山巅凝结的露水状金属，日出时会折射出七重光轮，每小时自动重置形态。
item.mscience-虚空黑曜石.name=虚空黑曜石
item.mscience-虚空黑曜石.description=密度无限接近黑洞事件视界的矿物，用于制造空间折叠锚点。\n\
深渊法师将其雕刻成门扉，可短暂连接冥河与现世。\n\
表面布满微型黑洞纹路的陨石，能让周围2米内重力反转。
item.mscience-流光晶.name=流光晶
item.mscience-流光晶.description=原子钟核心材料，其振动频率与宇宙微波背景辐射同步。\n\
时间术士将其制成沙漏，可局部加速或冻结时间5秒。\n\
外观：接触生物电流会激发表面光流运动，内部有沙粒般的光点逆流。
item.mscience-幻影幽晶.name=幻影幽晶
item.mscience-幻影幽晶.description=量子叠加态矿物，观测前形态不确定，科学家们常用其于加密通信的“薛定谔密钥”。\n\
幻术师将其粉末撒入风中，可制造覆盖城市的集体幻觉。\n\
外观：灰雾状固体，轮廓不断模糊重组。
item.mscience-星辰铜精.name=星辰铜精
item.mscience-星辰铜精.description=星辉铜提纯后的产物，中微子发射强度提升10倍，用于星际广播塔。\n\
星空法师将其熔入法杖，可召唤微型超新星爆炸。\n\
外观：星斑变为纯银色，夜晚亮度堪比萤火虫。
item.mscience-幽冥铁精.name=幽冥铁精
item.mscience-幽冥铁精.description=幽影铁的纳米化版本，隐形效果可覆盖半径100米的力场。\n\
魔法侧：死灵法师将其锻造成锁链，可束缚传奇恶魔的真名。\n\
外观：表面暗影色符文，温度恒定在零下100℃。
item.mscience-月幻石.name=月幻石
item.mscience-月幻石.description=月银的异构体，引力波共振频率可扭曲局部空间曲率。\n\
月神祭司将其研磨成颜料，绘制壁画可使神庙在月相变化时位移。\n\
外观：银色矿石表面浮现月球环形山全息图。
item.mscience-炽炎晶.name=炽炎晶
item.mscience-炽炎晶.description=炽炎硫的晶体化形态，燃烧温度达5000℃，用于行星地核钻探机。\n\
火焰领主将其嵌入王冠，可操控火山喷发轨迹。\n\
外观：炽红色八面体，周围空气因高温扭曲。
item.mscience-魂炎晶.name=魂炎晶
item.mscience-魂炎晶.description=检测到未知能量频谱，疑似与意识场耦合，用于脑机接口的“灵魂协议”。\n\
巫妖将自身命匣与此晶融合，便可跨位面重生。\n\
外观：半透明靛蓝色晶体，内部有磷火飘动。
item.mscience-寒霜石.name=寒霜石
item.mscience-寒霜石.description=绝对零度环境下形成的冰晶，用于超导磁悬浮系统的冷却剂。\n\
冰霜女巫将其雕琢成镜，可冻结镜中倒影对应的现实物体。\n\
外观：淡蓝色多孔矿物，接触空气时会凝结冰霜。
item.mscience-幽蓝石.name=幽蓝石
item.mscience-幽蓝石.description=深海高压合成的金属氢载体，用于聚变燃料的常温储存。\n\
海妖将其镶嵌在珊瑚权杖上，可操控洋流与潮汐。\n\
外观：深蓝色金属，表面有海浪状纹路。
item.mscience-曙光神金.name=曙光神金
item.mscience-曙光神金.description=曙光金与反物质微粒的合成物，能量转化效率突破卡诺极限。\n\
天使军团将其铸成圣剑，剑光可净化方圆十公里的混沌污染。\n\
外观：白金色金属，每秒释放一次带微量治愈闪光。
item.mscience-幻域紫晶.name=幻域紫晶
item.mscience-幻域紫晶.description=可发射特定频率的催眠电磁波，用于大规模虚拟现实剧场。\n\
幻影领主将其研磨成粉尘，吸入者可永久沉溺于定制幻境。\n\
外观：深紫色晶体，内部有漩涡状光带。
item.mscience-虚空冥石.name=虚空冥石
item.mscience-虚空冥石.description=虚空黑曜石的衰变产物，量子隧穿效应显著，用于跨维度探测器。\n\
冥界引渡人将其制成灯笼，可照亮通往彼岸的“黄泉小径”。\n\
外观：灰黑色多孔矿石，持续吸收周围声音。
item.mscience-熵炎埃.name=熵炎埃
item.mscience-熵炎埃.description=熵减反应堆的核心燃料，可逆转局部热力学第二定律。\n\
熵法师将其嵌入法阵，可使衰老、腐烂等过程倒流24小时。\n\
外观：暗红色晶体，周围物体呈现“逆熵”现象（如水滴倒流）。
item.mscience-银河幻银矿.name=银河幻银矿
item.mscience-银河幻银矿.description=这种矿石只存在于银河系中心的奇异星云中，由宇宙射线和高维能量凝聚而成。它的表面闪烁着银河般的星光，仿佛将整个宇宙的奥秘封存其中。\n\
轻如羽毛，却坚硬无比，能够吸收和释放空间能量。常用于制造跨维度传送装置。\n\
据说银河幻银矿是远古星际文明的遗物，只有被选中的人才能找到它。
item.mscience-魔影幻月石.name=魔影幻月石
item.mscience-魔影幻月石.description=在月食之夜，月光被魔影遮蔽时，这种神秘的矿石才会在地表显现。它的表面如同月光般柔和，却隐藏着黑暗的力量。\n\
半透明，内部有流动的黑色光晕，能够吸收负面情绪并转化为能量。\n\
传说中，魔影幻月石是月神与暗影之神争斗时留下的碎片。
item.mscience-灵魂星尘矿.name=灵魂星尘矿
item.mscience-灵魂星尘矿.description=由逝去的星辰灵魂凝聚而成，每一颗矿石都蕴含着星辰的记忆和力量。它的表面闪烁着微弱的星光，仿佛在诉说着宇宙的故事。\n\
触摸时会感受到温暖的能量流动，能够增强使用者的灵魂力量。\n\
据说灵魂星尘矿是星辰的眼泪，只有纯净的灵魂才能与之共鸣。
item.mscience-幽冥梦魇晶.name=幽冥梦魇晶
item.mscience-幽冥梦魇晶.description=诞生于冥界最深处的梦魇之地，这种晶体能够吸收和释放噩梦的力量。它的表面覆盖着黑色的雾气，仿佛在吞噬一切光明。\n\
触摸时会让人陷入短暂的幻觉，能够用于制造幻术武器。\n\
传说中，幽冥梦魇晶是冥界之主的眼泪，每一颗都封印着一个噩梦。
item.mscience-迷雾幽灵石.name=迷雾幽灵石
item.mscience-迷雾幽灵石.description=在迷雾笼罩的幽暗山谷中，这种矿石悄然生长。它的表面覆盖着淡淡的雾气，仿佛与周围的迷雾融为一体。\n\
能够吸收和释放迷雾能量，常用于制造隐身装置或幻象法术。\n\
据说迷雾幽灵石是迷雾之神的化身，只有心灵纯净的人才能找到它。
item.mscience-幻海深渊珀.name=幻海深渊珀
item.mscience-幻海深渊珀.description=在幻海深渊的最深处，这种琥珀般的矿石悄然形成。它的内部封存着远古海洋生物的灵魂，仿佛将整个海洋的奥秘封存其中。\n\
半透明，内部有流动的蓝色光晕，能够增强水属性法术的力量。\n\
据说幻海深渊珀是海洋之神的眼泪，每一颗都封印着一个远古生物的灵魂。
item.mscience-星辰泪滴石.name=星辰泪滴石
item.mscience-星辰泪滴石.description=当星辰陨落时，它们的泪水凝结成这种晶莹剔透的矿石。它的表面闪烁着微弱的星光，仿佛在诉说着星辰的悲伤。\n\
能够吸收星光能量并转化为治愈之力，常用于制造治疗装置。\n\
传说中，星辰泪滴石是星辰的眼泪，只有心怀慈悲的人才能使用它的力量。
item.mscience-虚空幽寂矿.name=虚空幽寂矿
item.mscience-虚空幽寂矿.description=在虚空的寂静之地，这种矿石悄然生长。它的表面漆黑如墨却又炫彩夺目，看上一眼就会噬人心魂。\n\
能够吸收声音和能量波动，常用于制造隐形装置或静音武器。\n\
据说虚空幽寂矿是虚空之神的碎片，每一颗都封印着一片寂静。
item.mscience-曙光幻神金.name=曙光幻神金
item.mscience-曙光幻神金.description=在黎明时分，当第一缕曙光洒向大地时，这种金色的矿石才会显现。它的表面闪烁着晨曦般的光芒，仿佛蕴含着新生的力量。\n\
能够吸收曙光能量并转化为生命之力，常用于制造治愈或强化装置。\n\
传说中，曙光幻神金是曙光女神的馈赠，只有心怀希望的人才能找到它。
item.mscience-宇宙秘宝岩.name=宇宙秘宝岩
item.mscience-宇宙秘宝岩.description=这种矿石是宇宙中最稀有的宝藏之一，由无数星尘和神秘能量凝聚而成。它的表面闪烁着七彩光芒，仿佛蕴含着无尽的财富。\n\
能够吸收宇宙能量并转化为物质，是制造顶级装备的核心材料。\n\
传说中，宇宙秘宝岩是宇宙诞生时的碎片，只有真正的探险家才能发现它。
